services:
  - type: web
    name: manplanner
    env: node
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: manplanner-db
          property: connectionString

databases:
  - name: manplanner-db
    plan: free
